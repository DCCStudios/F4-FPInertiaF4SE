; FP Inertia - Settings (Data/F4SE/Plugins/FPInertia.ini)
; Configure in-game via the F4SE Menu Framework overlay (F4SE Menu Framework required).
; You can also edit this file directly — changes are picked up by hot-reload.

[General]
; Master enable/disable for the entire mod
bEnabled=1
; Enable position offset (weapon shifts left/right/up/down)
bEnablePosition=1
; Enable rotation offset (weapon tilts and twists)
bEnableRotation=1
; Only apply inertia when weapon is drawn
bRequireWeaponDrawn=1
; Global intensity multiplier (0.0-5.0)
fGlobalIntensity=1.0
; Camera velocity smoothing (0.0 = no smoothing, 0.9 = very smooth)
fSmoothingFactor=0.5

[Settling]
; Time in seconds before the spring starts settling toward zero
fSettleDelay=0.3
; Speed at which settling damping increases
fSettleSpeed=2.0
; Maximum damping multiplier at full settle
fSettleDampingMult=3.0

[MovementInertia]
; Enable weapon sway in response to player movement
bEnabled=1
; Global strength multiplier for movement inertia
fStrength=3.0
; Minimum movement speed to trigger inertia (in-game units/second)
fThreshold=30.0
; Apply inertia to forward/backward movement (off by default)
bForwardBackInertia=0
; Suppress the game's built-in arm sway via behavior graph
bDisableVanillaSway=0

[ActionBlend]
; Reduce inertia while actively firing (keeps aim stable during shooting)
bBlendDuringFiring=0
; Reduce inertia while reloading
bBlendDuringReload=1
; Reduce inertia during melee attacks and bashes
bBlendDuringMelee=1
; Reduce inertia when throwing grenades
bBlendDuringGrenade=1
; Speed at which blend transitions (1-20)
fActionBlendSpeed=5.0
; Minimum inertia intensity during actions (0.0-1.0)
fActionMinIntensity=0.2

[PowerArmor]
; Enable FP Inertia while in Power Armor
bEnabled=1
; Use separate PA_ weapon type profiles (PA_Rifle, PA_Heavy, etc.)
bSeparateProfiles=1
; Multiplier applied when PA separate profiles are disabled
fMult=1.2

[Debug]
; Write detailed spring values to the log file (disable in normal use)
bDebugLogging=0
; Show debug values on screen
bDebugOnScreen=0
; Auto-reload settings when the MCM INI file is modified
bEnableHotReload=1
; How often to check for INI changes (seconds)
fHotReloadInterval=5.0
